<!DOCTYPE html>
<html lang="">
<head>
    <title>Home page</title>
    <script src="./resources/Utils.js" charset="utf-8" defer></script>
    <script src="./resources/LoginPageManager.js" charset="utf-8" defer></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>Playlist Manager</h1>

    <!-- Login -->
    <div class="auth-section">
        <h2>Login</h2>
        <div class="form-container">
            <form action="#" method="post">
                <div>
                    <label>
                        <input
                                name="username"
                                type="text"
                                required
                                placeholder="Username"
                        />
                    </label>
                </div>
                <div>
                    <label>
                        <input
                                name="password"
                                type="password"
                                required
                                placeholder="Password"
                        />
                    </label>
                </div>
                <button id="LoginButton" type="submit" value = "Sign in" >Sign in</button>
            </form>
            <p id="errorMessageLogin"> </p>
        </div>
    </div>

    <!-- Register -->
    <div class="auth-section">
        <h2>Register</h2>
        <div class="form-container">
            <form action="#" method="post">
                <div>
                    <label>
                        <input
                                name="newUsername"
                                type="text"
                                required
                                placeholder="Username"
                        />
                    </label>
                </div>
                <div>
                    <label>
                        <input
                                name="newName"
                                type="text"
                                required
                                placeholder="Name"
                        />
                    </label>
                </div>
                <div>
                    <label>
                        <input
                                name="newSurname"
                                type="text"
                                required
                                placeholder="Surname"
                        />
                    </label>
                </div>
                <div>
                    <label>
                        <input
                                name="newPassword"
                                type="password"
                                required
                                placeholder="Password"
                        />
                    </label>
                </div>
                <div>
                    <label>
                        <input
                                name="newRepeatedPassword"
                                type="password"
                                required
                                placeholder="Repeat Password"
                        />
                    </label>
                </div>
                <button id="RegistratonButton" type="submit">Sign up</button>
            </form>
            <p id="errorMessageRegistration"> </p>
            <p id="OKMessageRegistration"> </p>
        </div>
    </div>
</div>
</body>
</html>
