<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home page</title>
    <link rel="stylesheet" href="style.css">

    <!-- include il tuo Utils e il HomePageManager -->
    <script src="./resources/Utils.js" defer></script>
    <script src="./resources/HomePageManager.js" defer></script>
</head>
<body>
<div class="container">
    <h1>Home page</h1>
    <!-- contenitore per messaggi di errore/info -->

    <h2>Your playlists are here!</h2>
    <p id="messageContainer"></p>
    <table id="playlistTable">
        <thead>
        <tr>
            <th>Title</th>
            <th>Creation date</th>
        </tr>
        </thead>
        <tbody id="playlistTableBody">
        <!-- verrà popolato via JS -->
        </tbody>
    </table>
    <div id="playerContainer" style="margin-top:2em; display:none;"></div>
    <div id="playlistDetailContainer" style="margin-top:2em;"></div>

    <!-- poi i form di album/track/playlist… -->

    <h2>Create a New Album</h2>
    <form id="albumForm" action="#" method="post" enctype="multipart/form-data">
        <div>
            <label>
                <input name="title" type="text" required placeholder="Album Title">
            </label>
        </div>
        <div>
            <label>
                <input name="performer" type="text" required placeholder="Performer">
            </label>
        </div>
        <div>
            <label>
                <input name="publicationYear"
                       type="number"
                       required
                       placeholder="Publication Year"
                       min="1000"
                       max="2025">
            </label>
        </div>
        <div>
            <label>Upload Image here:</label>
            <input name="image" type="file" required accept="image/*">
            <small>Maximum image size is 5MB.</small>
        </div>
        <button type="submit">Create Album</button>
    </form>

    <h2>Upload a Track</h2>
    <form id="trackForm" action="#" method="post" enctype="multipart/form-data">
        <div>
            <label for="albumSelect">Album:</label>
            <select id="albumSelect" name="albumId" required>
                <!-- verrà popolato via JS -->
            </select>
        </div>
        <div>
            <label>
                <input name="title" type="text" required placeholder="Track Title">
            </label>
        </div>
        <div>
            <label for="genreSelect">Genre:</label>
            <select id="genreSelect" name="genreName" required>
                <!-- verrà popolato via JS -->
            </select>
        </div>
        <div>
            <label>Upload Audio here:</label>
            <input name="audioFile" type="file" accept="audio/*" required>
            <small>Maximum upload size 10MB.</small>
        </div>
        <button type="submit">Upload Track</button>
    </form>

    <h2>Create a New Playlist</h2>
    <form id="playlistForm" action="#" method="post">
        <div>
            <label>
                <input name="title"
                       type="text"
                       required
                       placeholder="Playlist Title">
            </label>
        </div>
        <div>
            <label>Select Tracks:</label>
            <div class="checkbox-group" id="trackCheckboxGroup">
                <!-- verrà popolato via JS -->
            </div>
        </div>
        <button type="submit">Create Playlist</button>
    </form>

    <p>
        <a class="logout" href="Logout">Logout</a>
    </p>
</div>
</body>
</html>
