<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home page</title>
    <link rel="stylesheet" href="style.css">
    <script src="resources/Utils.js" defer></script>
    <script src="resources/ReorderModal.js" defer></script>
    <script src="resources/PlaylistDetailView.js" defer></script>
    <script src="resources/PlayerView.js" defer></script>
    <script src="resources/PlaylistTable.js" defer></script>
    <script src="resources/AlbumCreator.js" defer></script>
    <script src="resources/TrackUploader.js" defer></script>
    <script src="resources/PlaylistCreator.js" defer></script>
    <script src="resources/HomePageManager.js" defer></script>
</head>
<body>
<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Polify Logo" class="logo-img">
    </div>

    <h2>Your playlists are here!</h2>
    <p id="messageContainer"></p>
    <table id="playlistTable">
        <thead>
        <tr>
            <th>Title</th>
            <th>Creation date</th>
        </tr>
        </thead>
        <tbody id="playlistTableBody">
        </tbody>
    </table>
    <div id="playerContainer" class="track-player" hidden>
        <div class="player-header">
            <h2 id="playerTitle"></h2>
            <button id="closePlayer" class="close-button">Close</button>
        </div>

        <div class="player-content">
            <div class="album-cover">
                <img id="playerCover" class="album-img" alt="Album cover" hidden style="width:300px; height:auto;"
                     src="">
            </div>

            <div class="track-info">
                <dl class="info-list">
                    <dt>Performer:</dt>
                    <dd id="playerPerformer"></dd>
                    <dt>Album:</dt>
                    <dd id="playerAlbum"></dd>
                    <dt>Genre:</dt>
                    <dd id="playerGenre"></dd>
                </dl>

                <audio id="playerAudio" controls></audio>
            </div>
        </div>
    </div>


    <div id="playlistDetailContainer" class="playlist-detail" hidden>
        <div class="detail-header">
            <h2 id="detailTitle"></h2>
            <button id="closeBtn" class="close-button">Close</button>
        </div>

        <div class="playlist-navigation">
            <button id="prevBtn" class="nav-button prev-button">PREVIOUS</button>

            <div class="tracks-container">
                <table id="detailTable">
                    <tr id="detailRow"></tr>
                </table>
            </div>

            <button id="nextBtn" class="nav-button next-button">NEXT</button>
        </div>

        <section class="add-tracks-form">
            <h3>Add tracks to playlist</h3>
            <form id="addTracksForm">
                <div class="checkbox-group" id="availableTracksGroup"></div>
                <button type="submit" id="addTracksBtn">Add selected tracks</button>
            </form>
        </section>
    </div>
    <template id="trackCellTpl">
        <td>
            <a href="#" class="track-link" data-track-id="">
                <div class="track-title"></div>
                <img class="track-image" alt="cover" src="">
            </a>
        </td>
    </template>
    <template id="checkboxTpl">
        <div class="checkbox-item">
            <input type="checkbox" value="" id="">
            <label for=""></label>
        </div>
    </template>



    <h2>Create a New Album</h2>
    <form id="albumForm" action="#" method="post" enctype="multipart/form-data">
        <div>
            <label>
                <input name="title" type="text" required placeholder="Album Title">
            </label>
        </div>
        <div>
            <label>
                <input name="performer" type="text" required placeholder="Performer">
            </label>
        </div>
        <div>
            <label>
                <input name="publicationYear"
                       type="number"
                       required
                       placeholder="Publication Year"
                       min="1000"
                       max="2025">
            </label>
        </div>
        <div>
            <label>Upload Image here:</label>
            <input name="image" type="file" required accept="image/*">
            <small>Maximum image size is 5MB.</small>
        </div>
        <button type="submit">Create Album</button>
    </form>

    <h2>Upload a Track</h2>
    <form id="trackForm" action="#" method="post" enctype="multipart/form-data">
        <div>
            <label for="albumSelect">Album:</label>
            <select id="albumSelect" name="albumId" required>
            </select>
        </div>
        <div>
            <label>
                <input name="title" type="text" required placeholder="Track Title">
            </label>
        </div>
        <div>
            <label for="genreSelect">Genre:</label>
            <select id="genreSelect" name="genreName" required>
            </select>
        </div>
        <div>
            <label>Upload Audio here:</label>
            <input name="audioFile" type="file" accept="audio/*" required>
            <small>Maximum upload size 10MB.</small>
        </div>
        <button type="submit">Upload Track</button>
    </form>

    <h2>Create a New Playlist</h2>
    <form id="playlistForm" action="#" method="post">
        <div>
            <label>
                <input name="title"
                       type="text"
                       required
                       placeholder="Playlist Title">
            </label>
        </div>
        <div>
            <label>Select Tracks:</label>
            <div class="checkbox-group" id="trackCheckboxGroup">
            </div>
        </div>
        <button type="submit">Create Playlist</button>
    </form>

    <p>
        <a class="logout" href="Logout">Logout</a>
    </p>
</div>

<div id="modalOverlay" class="modal-overlay is-hidden"></div>

<div id="reorderModal"
     class="modal-dialog is-hidden"
     role="dialog"
     aria-modal="true"
     aria-labelledby="reorderModalTitle">

    <h2 id="reorderModalTitle">Reorder playlist</h2>

    <div id="loadingIndicator" class="loading-indicator is-hidden">
        Loading in progress, please wait...
    </div>

    <ul id="reorderList" class="reorder-list"></ul>

    <div class="modal-actions">
        <button id="cancelReorderBtn" class="btn-secondary">Cancel</button>
        <button id="saveReorderBtn"   class="btn-primary">Save order</button>
    </div>
</div>

</body>
</html>
